<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body {
    font-family: Arial;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card {
    background:#1e293b;
    padding:25px;
    border-radius:10px;
    width:300px;
}

input, button {
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:6px;
}

input { background:#334155; color:white; }

button {
    background:#22c55e;
    color:white;
    font-weight:bold;
}

.error { color:red; }
</style>

</head>
<body>

<div class="card">
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Masuk</button>
    <p class="error" id="error"></p>
</div>

<script>

const users = [
    {username:"admin", password:"123", role:"admin"},
    {username:"user", password:"123", role:"user"}
];

function login(){
    let u = username.value;
    let p = password.value;

    let user = users.find(x => x.username===u && x.password===p);

    if(user){
        localStorage.setItem("user", JSON.stringify(user));

        // 🔥 LANGSUNG KE drum.html
        window.location.href = "drum.html";

    }else{
        error.innerText = "Username / Password salah!";
    }
}

// AUTO LOGIN
window.onload = function(){
    if(localStorage.getItem("user")){
        window.location.href = "drum.html";
    }
}

</script>

</body>
</html>
