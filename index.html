<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <style>
    body {
      font-family: Arial;
      background: #121212;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background: #1e1e1e;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 5px;
      background: #333;
      color: white;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 5px;
      background: #00c853;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #00e676;
    }

    .error {
      color: red;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<div class="login-box">
  <h2>LOGIN</h2>

  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <div class="error" id="error"></div>
</div>

<script>

// AUTO LOGIN kalau sudah ada session
if (localStorage.getItem("role")) {
  window.location.href = "drum.html";
}

function login() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  // ADMIN
  if (username === "admin" && password === "admin123") {
    localStorage.setItem("role", "admin");
    window.location.href = "drum.html";
  }
  // USER
  else if (username === "user" && password === "user123") {
    localStorage.setItem("role", "user");
    window.location.href = "drum.html";
  }
  else {
    document.getElementById("error").textContent = "Username atau password salah!";
  }
}

</script>

</body>
</html>
