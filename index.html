<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body {
  font-family: Arial;
  background: #121212;
  color: white;
  display: flex;
  height: 100vh;
  justify-content: center;
  align-items: center;
  margin: 0;
}

.login-box {
  background: #1e1e1e;
  padding: 20px;
  border-radius: 10px;
  width: 250px;
  text-align: center;
}

input {
  width: 100%;
  padding: 8px;
  margin: 10px 0;
  border: none;
  border-radius: 5px;
}

button {
  width: 100%;
  padding: 10px;
  border: none;
  background: green;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}
</style>
</head>

<body>

<div class="login-box">
  <h2>Login</h2>

  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login</button>
</div>

<script>

function login(){

  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  // ADMIN
  if(user === "admin" && pass === "admin123"){
    localStorage.setItem("role","admin");
    location.href = "menu.html";
  }

  // OPERATOR (USER)
  else if(user === "operator" && pass === "6478807"){
    localStorage.setItem("role","user");
    location.href = "menu.html";
  }

  else{
    alert("Username atau password salah!");
  }

}

</script>

</body>
</html>
