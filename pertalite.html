<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Data Pertalite</title>

<style>
body{
  font-family:Arial;
  background:#111;
  color:#fff;
  padding:15px;
}

h2{text-align:center;}

.total-box{
  background:#222;
  padding:10px;
  margin-bottom:10px;
  text-align:center;
  font-size:16px;
  border:1px solid #444;
}

input,button{
  padding:8px;
  margin:3px 0;
  width:100%;
  font-size:14px;
}

button{
  background:green;
  color:white;
  border:none;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:15px;
}

th,td{
  border:1px solid #444;
  padding:6px;
  text-align:center;
}

.small{
  width:60px;
}

/* 🔥 FLEX UNTUK INPUT + TOMBOL */
.row{
  display:flex;
  gap:5px;
  align-items:center;
  margin-bottom:3px;
}

.del{
  background:red;
  color:white;
  border:none;
  width:30px;
  cursor:pointer;
  font-weight:bold;
}

.red{
  background:red;
  color:white;
  font-weight:bold;
}
</style>
</head>

<body>

<h2>DATA PERTALITE</h2>

<div class="total-box" id="totalInfo">
Total Terpakai: 0 LITER<br>
Total Uang: Rp 0
</div>

<h3>Tambah Data</h3>
<input type="text" id="nama" placeholder="Nama">
<input type="number" id="stok" placeholder="Stock Awal">
<button onclick="tambah()">TAMBAH</button>

<hr>

<table>
<thead>
<tr>
<th>No</th>
<th>Nama</th>
<th>Stock</th>
<th>Update</th>
<th>Transaksi</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="tabel"></tbody>
</table>

<script>
let data = JSON.parse(localStorage.getItem("pertalite_inline")) || [];

function simpan(){
  localStorage.setItem("pertalite_inline", JSON.stringify(data));
}

function hitungTotal(){
  let total = 0;

  data.forEach(d=>{
    total += (d.stock - d.update);
  });

  document.getElementById("totalInfo").innerHTML =
    "Total Terpakai: " + total + " LITER<br>" +
    "Total Uang: Rp " + (total * 10000).toLocaleString("id-ID");
}

function render(){
  let t = document.getElementById("tabel");
  t.innerHTML = "";

  data.forEach((d,i)=>{

    if(!d.transaksi){
      d.transaksi = [];
    }

    let kolom = "";

    d.transaksi.forEach((v,j)=>{
      kolom += `
        <div class="row">
          <input class="small" type="number"
            value="${v}"
            onblur="edit(${i},${j},this)">
          <button class="del" onclick="hapusTransaksi(${i},${j})">-</button>
        </div>
      `;
    });

    if(d.update > 0){
      kolom += `
        <input class="small" type="number"
          placeholder="+"
          onblur="tambahTransaksi(${i},this)">
      `;
    }

    let updateClass = d.update == 0 ? "red" : "";

    t.innerHTML += `
      <tr>
        <td>${i+1}</td>
        <td>${d.nama}</td>
        <td>${d.stock}</td>
        <td class="${updateClass}">${d.update}</td>
        <td>${kolom}</td>
        <td>
          <button class="del" onclick="hapusData(${i})">🗑️</button>
        </td>
      </tr>
    `;
  });

  simpan();
  hitungTotal();
}

function tambah(){
  let nama = document.getElementById("nama").value;
  let stok = parseFloat(document.getElementById("stok").value);

  if(nama && !isNaN(stok)){
    data.push({
      nama:nama,
      stock:stok,
      update:stok,
      transaksi:[]
    });

    document.getElementById("nama").value = "";
    document.getElementById("stok").value = "";

    render();
  }
}

function tambahTransaksi(i,input){
  let val = parseFloat(input.value);

  if(isNaN(val) || val <= 0) return;
  if(data[i].update <= 0) return;

  data[i].update -= val;
  if(data[i].update < 0) data[i].update = 0;

  data[i].transaksi.push(val);

  render();
}

function edit(i,j,input){
  let val = parseFloat(input.value);

  if(isNaN(val)) return;

  let old = data[i].transaksi[j] || 0;
  let selisih = val - old;

  data[i].update -= selisih;

  if(data[i].update < 0){
    data[i].update = 0;
  }

  data[i].transaksi[j] = val;

  render();
}

function hapusTransaksi(i,j){
  let val = data[i].transaksi[j];

  data[i].update += val;

  data[i].transaksi.splice(j,1);

  render();
}

function hapusData(i){
  if(confirm("Hapus data ini?")){
    data.splice(i,1);
    render();
  }
}

render();
</script>

</body>
</html>
