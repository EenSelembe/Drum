<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Data Pertalite Online</title>

<style>
body{
  font-family:Arial;
  background:#111;
  color:#fff;
  padding:15px;
}

h2{text-align:center;}

.total-box{
  background:#222;
  padding:10px;
  margin-bottom:10px;
  text-align:center;
  font-size:16px;
  border:1px solid #444;
}

input,button{
  padding:8px;
  margin:3px 0;
  width:100%;
  font-size:14px;
}

button{
  background:green;
  color:white;
  border:none;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:15px;
}

th,td{
  border:1px solid #444;
  padding:6px;
  text-align:center;
}

.small{width:60px;}

.row{
  display:flex;
  gap:5px;
  align-items:center;
}

.del{
  background:red;
  color:white;
  border:none;
  width:30px;
  cursor:pointer;
}

.red{
  background:red;
  color:white;
  font-weight:bold;
}
</style>
</head>

<body>

<h2>DATA PERTALITE (ONLINE)</h2>

<div class="total-box" id="totalInfo">
Loading...
</div>

<h3>Tambah Data</h3>
<input type="text" id="nama" placeholder="Nama">
<input type="number" id="stok" placeholder="Stock Awal">
<button onclick="tambah()">TAMBAH</button>

<hr>

<table>
<thead>
<tr>
<th>No</th>
<th>Nama</th>
<th>Stock</th>
<th>Update</th>
<th>Transaksi</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="tabel"></tbody>
</table>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getDatabase, ref, set, onValue, push, remove, update } 
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";

// 🔥 FIREBASE CONFIG KAMU
const firebaseConfig = {
  apiKey: "AIzaSyCgLz1_bFzcFzGEbYSIHRpoy3acReyuB7Y",
  authDomain: "drum-26d1c.firebaseapp.com",
  projectId: "drum-26d1c",
  storageBucket: "drum-26d1c.firebasestorage.app",
  messagingSenderId: "960892789351",
  appId: "1:960892789351:web:9cbdd5f865fb595586eac2",
  measurementId: "G-ERBNYX188K"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let data = {};

// 🔥 LIVE LISTENER (REALTIME)
onValue(ref(db, "pertalite"), (snapshot)=>{
  data = snapshot.val() || {};
  render();
});

function hitungTotal(){
  let total = 0;

  Object.values(data).forEach(d=>{
    total += (d.stock - d.update);
  });

  document.getElementById("totalInfo").innerHTML =
    "Total Terpakai: " + total + " LITER<br>" +
    "Total Uang: Rp " + (total * 10000).toLocaleString("id-ID");
}

function render(){
  let t = document.getElementById("tabel");
  t.innerHTML = "";

  let arr = Object.entries(data);

  arr.forEach(([key,d],i)=>{

    if(!d.transaksi) d.transaksi = [];

    let kolom = "";

    d.transaksi.forEach((v,j)=>{
      kolom += `
        <div class="row">
          <input class="small" type="number" value="${v}"
            onchange="edit('${key}',${j},this)">
          <button class="del" onclick="hapusTransaksi('${key}',${j})">-</button>
        </div>
      `;
    });

    if(d.update > 0){
      kolom += `
        <input class="small" type="number"
          placeholder="+"
          onchange="tambahTransaksi('${key}',this)">
      `;
    }

    let red = d.update == 0 ? "red" : "";

    t.innerHTML += `
      <tr>
        <td>${i+1}</td>
        <td>${d.nama}</td>
        <td>${d.stock}</td>
        <td class="${red}">${d.update}</td>
        <td>${kolom}</td>
        <td>
          <button class="del" onclick="hapusData('${key}')">🗑️</button>
        </td>
      </tr>
    `;
  });

  hitungTotal();
}

// 🔥 TAMBAH DATA
window.tambah = function(){
  let nama = document.getElementById("nama").value;
  let stok = parseFloat(document.getElementById("stok").value);

  if(!nama || isNaN(stok)) return;

  const newRef = push(ref(db,"pertalite"));

  set(newRef,{
    nama:nama,
    stock:stok,
    update:stok,
    transaksi:[]
  });

  document.getElementById("nama").value = "";
  document.getElementById("stok").value = "";
};

// 🔥 TRANSAKSI
window.tambahTransaksi = function(key,input){
  let val = parseFloat(input.value);
  if(isNaN(val)) return;

  const itemRef = ref(db,"pertalite/"+key);

  onValue(itemRef,(snap)=>{
    let d = snap.val();

    d.update -= val;
    if(d.update < 0) d.update = 0;

    d.transaksi.push(val);

    set(itemRef,d);
  },{onlyOnce:true});
};

// 🔥 HAPUS TRANSAKSI
window.hapusTransaksi = function(key,j){
  const itemRef = ref(db,"pertalite/"+key);

  onValue(itemRef,(snap)=>{
    let d = snap.val();

    let val = d.transaksi[j];

    d.update += val;
    d.transaksi.splice(j,1);

    set(itemRef,d);
  },{onlyOnce:true});
};

// 🔥 HAPUS DATA
window.hapusData = function(key){
  remove(ref(db,"pertalite/"+key));
};

// 🔥 EDIT
window.edit = function(key,j,input){
  let val = parseFloat(input.value);

  const itemRef = ref(db,"pertalite/"+key);

  onValue(itemRef,(snap)=>{
    let d = snap.val();

    let old = d.transaksi[j];
    let selisih = val - old;

    d.update -= selisih;
    if(d.update < 0) d.update = 0;

    d.transaksi[j] = val;

    set(itemRef,d);
  },{onlyOnce:true});
};

</script>

</body>
</html>
