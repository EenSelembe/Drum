<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>PERTALITE ONLINE FIX</title>

<style>
body{
  font-family:Arial;
  background:#111;
  color:#fff;
  padding:15px;
}

h2{text-align:center;}

.total-box{
  background:#222;
  padding:10px;
  margin-bottom:10px;
  text-align:center;
  font-size:16px;
  border:1px solid #444;
}

input,button{
  padding:8px;
  margin:3px 0;
  width:100%;
  font-size:14px;
}

button{
  background:green;
  color:white;
  border:none;
  cursor:pointer;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:15px;
}

th,td{
  border:1px solid #444;
  padding:6px;
  text-align:center;
}

.small{
  width:60px;
}

.row{
  display:flex;
  gap:5px;
  align-items:center;
}

.del{
  background:red;
  color:white;
  border:none;
  width:30px;
  cursor:pointer;
}

.red{
  background:red;
  color:white;
  font-weight:bold;
}

#roleBox{
  text-align:center;
  background:#222;
  padding:5px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<h2>DATA PERTALITE (ONLINE)</h2>

<div id="roleBox">ROLE: <span id="roleText"></span></div>

<div class="total-box" id="totalInfo">Loading...</div>

<div id="adminForm"></div>

<hr>

<table>
<thead>
<tr>
<th>No</th>
<th>Nama</th>
<th>Stock</th>
<th>Update</th>
<th>Transaksi</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="tabel"></tbody>
</table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getDatabase, ref, set, onValue, push, remove } 
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";

// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCgLz1_bFzcFzGEbYSIHRpoy3acReyuB7Y",
  authDomain: "drum-26d1c.firebaseapp.com",
  projectId: "drum-26d1c",
  storageBucket: "drum-26d1c.firebasestorage.app",
  messagingSenderId: "960892789351",
  appId: "1:960892789351:web:9cbdd5f865fb595586eac2"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// 🔥 FIX PENTING: PAKAI LOCALSTORAGE
let role = localStorage.getItem("role");

console.log("ROLE:", role);

// kalau tidak ada role
if(!role){
  alert("Silakan login dulu");
  window.location.href = "index.html";
}

// tampil role
document.getElementById("roleText").innerText = role.toUpperCase();

// 🔥 FORM ADMIN
if(role === "admin"){
  document.getElementById("adminForm").innerHTML = `
    <h3>Tambah Data (ADMIN)</h3>
    <input type="text" id="nama" placeholder="Nama">
    <input type="number" id="stok" placeholder="Stock Awal">
    <button onclick="tambah()">TAMBAH</button>
  `;
}

let data = {};

onValue(ref(db,"pertalite"), snap=>{
  data = snap.val() || {};
  render();
});

// 🔥 TOTAL HITUNG
function hitungTotal(){
  let total = 0;

  Object.values(data).forEach(d=>{
    total += (d.stock - d.update);
  });

  document.getElementById("totalInfo").innerHTML =
    "Total Terpakai: " + total + " LITER<br>" +
    "Total Uang: Rp " + (total * 10000).toLocaleString("id-ID");
}

// 🔥 RENDER
function render(){
  let t = document.getElementById("tabel");
  t.innerHTML = "";

  let arr = Object.entries(data);

  arr.forEach(([key,d],i)=>{

    if(!d.transaksi) d.transaksi = [];

    let kolom = "";

    d.transaksi.forEach((v,j)=>{

      kolom += `
        <div class="row">

          <input class="small"
            value="${v}"
            ${role === "user" ? `onchange="edit('${key}',${j},this)"` : `disabled`}>

          ${role === "user" ? `
            <button class="del" onclick="hapusTransaksi('${key}',${j})">-</button>
          ` : ""}
        </div>
      `;
    });

    if(role === "user" && d.update > 0){
      kolom += `
        <input class="small"
          placeholder="+"
          onchange="tambahTransaksi('${key}',this)">
      `;
    }

    let red = d.update == 0 ? "red" : "";

    t.innerHTML += `
      <tr>
        <td>${i+1}</td>
        <td>${d.nama}</td>
        <td>${d.stock}</td>
        <td class="${red}">${d.update}</td>
        <td>${kolom}</td>

        <td>
          ${role === "admin" ? `
            <button class="del" onclick="hapusData('${key}')">🗑️</button>
          ` : ""}
        </td>
      </tr>
    `;
  });

  hitungTotal();
}

// 🔥 TAMBAH DATA (ADMIN)
window.tambah = function(){
  if(role !== "admin") return;

  let nama = document.getElementById("nama").value;
  let stok = parseFloat(document.getElementById("stok").value);

  if(!nama || isNaN(stok)) return;

  let newRef = push(ref(db,"pertalite"));

  set(newRef,{
    nama,
    stock:stok,
    update:stok,
    transaksi:[]
  });

  document.getElementById("nama").value = "";
  document.getElementById("stok").value = "";
};

// 🔥 TRANSAKSI (USER)
window.tambahTransaksi = function(key,input){
  let val = parseFloat(input.value);
  if(isNaN(val)) return;

  let d = data[key];

  d.update -= val;
  if(d.update < 0) d.update = 0;

  d.transaksi.push(val);

  set(ref(db,"pertalite/"+key), d);

  input.value = "";
};

// 🔥 EDIT (USER)
window.edit = function(key,j,input){
  let val = parseFloat(input.value);
  if(isNaN(val)) return;

  let d = data[key];

  let old = d.transaksi[j];
  let selisih = val - old;

  d.update -= selisih;
  if(d.update < 0) d.update = 0;

  d.transaksi[j] = val;

  set(ref(db,"pertalite/"+key), d);
};

// 🔥 HAPUS TRANSAKSI (USER)
window.hapusTransaksi = function(key,j){
  let d = data[key];

  let val = d.transaksi[j];

  d.update += val;
  d.transaksi.splice(j,1);

  set(ref(db,"pertalite/"+key), d);
};

// 🔥 HAPUS DATA (ADMIN)
window.hapusData = function(key){
  if(role !== "admin") return;
  remove(ref(db,"pertalite/"+key));
};

</script>

</body>
</html>
