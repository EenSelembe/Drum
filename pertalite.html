<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>PERTALITE SYSTEM FIX</title>

<style>
body{
  font-family:Arial;
  background:#111;
  color:#fff;
  padding:15px;
}

h2{text-align:center;}

#roleBox{
  text-align:center;
  background:#222;
  padding:8px;
  margin-bottom:10px;
}

.total{
  background:#222;
  padding:10px;
  margin-bottom:10px;
  text-align:center;
}

input,button{
  padding:8px;
  margin:4px 0;
  width:100%;
  font-size:14px;
}

button{
  background:green;
  color:white;
  border:none;
  cursor:pointer;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th,td{
  border:1px solid #444;
  padding:6px;
  text-align:center;
}

.small{
  width:60px;
}

.del{
  background:red;
  color:white;
  border:none;
  width:30px;
  cursor:pointer;
}

.red{
  background:red;
  color:white;
}
</style>
</head>

<body>

<h2>DATA PERTALITE</h2>

<div id="roleBox">ROLE: <span id="roleText"></span></div>

<div class="total" id="totalBox">Loading...</div>

<div id="adminForm"></div>

<table>
<thead>
<tr>
<th>No</th>
<th>Nama</th>
<th>Stock</th>
<th>Update</th>
<th>Transaksi</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="tabel"></tbody>
</table>

<script type="module">

// 🔥 FIREBASE IMPORT (STABIL)
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import {
  getDatabase,
  ref,
  set,
  push,
  onValue,
  remove
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";

// 🔥 CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyCgLz1_bFzcFzGEbYSIHRpoy3acReyuB7Y",
  authDomain: "drum-26d1c.firebaseapp.com",
  projectId: "drum-26d1c",
  storageBucket: "drum-26d1c.firebasestorage.app",
  messagingSenderId: "960892789351",
  appId: "1:960892789351:web:9cbdd5f865fb595586eac2"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// 🔥 ROLE FIX (WAJIB LOCALSTORAGE)
let role = localStorage.getItem("role");

console.log("ROLE:", role);

if(!role){
  alert("Silakan login dulu");
  window.location.href = "index.html";
}

document.getElementById("roleText").innerText = role.toUpperCase();

// 🔥 ADMIN FORM
if(role === "admin"){
  document.getElementById("adminForm").innerHTML = `
    <h3>Tambah Data</h3>
    <input id="nama" placeholder="Nama">
    <input id="stok" type="number" placeholder="Stock">
    <button onclick="tambah()">TAMBAH</button>
  `;
}

// 🔥 DATA FIREBASE REALTIME
let data = {};

onValue(ref(db,"pertalite"), snap=>{
  data = snap.val() || {};
  render();
});

// 🔥 TOTAL HITUNG
function hitungTotal(){
  let total = 0;

  Object.values(data).forEach(d=>{
    total += (d.stock - d.update);
  });

  document.getElementById("totalBox").innerHTML =
    "Total Terpakai: " + total + " LITER<br>" +
    "Total Uang: Rp " + (total * 10000).toLocaleString("id-ID");
}

// 🔥 RENDER TABLE
function render(){

  let t = document.getElementById("tabel");
  t.innerHTML = "";

  let arr = Object.entries(data);

  arr.forEach(([key,d],i)=>{

    if(!d.transaksi) d.transaksi = [];

    let kolom = "";

    d.transaksi.forEach((v,j)=>{
      kolom += `
        <div>
          <input class="small"
            value="${v}"
            ${role==="user" ? `onchange="edit('${key}',${j},this)"` : "disabled"}>
          ${role==="user" ? `<button class="del" onclick="hapusTransaksi('${key}',${j})">-</button>` : ""}
        </div>
      `;
    });

    if(role==="user" && d.update > 0){
      kolom += `
        <input class="small" placeholder="+" onchange="tambahTransaksi('${key}',this)">
      `;
    }

    let red = d.update==0 ? "red" : "";

    t.innerHTML += `
      <tr>
        <td>${i+1}</td>
        <td>${d.nama}</td>
        <td>${d.stock}</td>
        <td class="${red}">${d.update}</td>
        <td>${kolom}</td>
        <td>
          ${role==="admin" ? `<button class="del" onclick="hapus('${key}')">🗑️</button>` : ""}
        </td>
      </tr>
    `;
  });

  hitungTotal();
}

// 🔥 TAMBAH DATA (ADMIN)
window.tambah = function(){

  let nama = document.getElementById("nama").value;
  let stok = parseFloat(document.getElementById("stok").value);

  if(!nama || isNaN(stok)) return;

  let newRef = push(ref(db,"pertalite"));

  set(newRef,{
    nama:nama,
    stock:stok,
    update:stok,
    transaksi:[]
  });

  document.getElementById("nama").value="";
  document.getElementById("stok").value="";
};

// 🔥 TAMBAH TRANSAKSI
window.tambahTransaksi = function(key,input){

  let val = parseFloat(input.value);
  if(isNaN(val)) return;

  let d = data[key];

  d.update -= val;
  if(d.update < 0) d.update = 0;

  d.transaksi.push(val);

  set(ref(db,"pertalite/"+key), d);

  input.value="";
};

// 🔥 EDIT TRANSAKSI
window.edit = function(key,j,input){

  let val = parseFloat(input.value);
  if(isNaN(val)) return;

  let d = data[key];

  let old = d.transaksi[j];

  d.update -= (val - old);
  if(d.update < 0) d.update = 0;

  d.transaksi[j] = val;

  set(ref(db,"pertalite/"+key), d);
};

// 🔥 HAPUS TRANSAKSI
window.hapusTransaksi = function(key,j){

  let d = data[key];

  let val = d.transaksi[j];

  d.update += val;

  d.transaksi.splice(j,1);

  set(ref(db,"pertalite/"+key), d);
};

// 🔥 HAPUS DATA (ADMIN)
window.hapus = function(key){
  remove(ref(db,"pertalite/"+key));
};

</script>

</body>
</html>
