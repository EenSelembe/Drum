<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Data Drum Online</title>

<style>
body {
  font-family: Arial;
  background: #121212;
  color: white;
  padding: 20px;
}

table {
  border-collapse: collapse;
  width: 100%;
  display: block;
  overflow-x: auto;
}

th, td {
  border: 1px solid #444;
  padding: 6px;
  text-align: center;
  min-width: 60px;
}

th { background: #1e1e1e; }

input {
  background: #1e1e1e;
  color: white;
  border: none;
  text-align: center;
}

button {
  padding: 8px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

#btnTambah { background: green; }
.logout { background: red; }

</style>
</head>

<body>

<div style="display:flex;justify-content:space-between;">
  <h2>DATA DRUM ONLINE</h2>
  <div>
    <span id="infoUser"></span>
    <button class="logout" onclick="logout()">Logout</button>
  </div>
</div>

<button id="btnTambah">Tambah Baris</button>

<table>
<thead>
<tr>
<th>Nama</th>
<th>Jumlah</th>
<script>
for(let i=1;i<=20;i++){
  document.write("<th>"+i+"</th>");
}
</script>
<th>Total</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>

<h3>Total Semua: <span id="grandTotal">0</span></h3>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  updateDoc,
  doc,
  deleteDoc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCgLz1_bFzcFzGEbYSIHRpoy3acReyuB7Y",
  authDomain: "drum-26d1c.firebaseapp.com",
  projectId: "drum-26d1c",
  storageBucket: "drum-26d1c.firebasestorage.app",
  messagingSenderId: "960892789351",
  appId: "1:960892789351:web:ca1c653c85cab59586eac2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let role = localStorage.getItem("role");

if(!role){
  location.href = "index.html";
}

document.getElementById("infoUser").innerText = "Login: " + role;

if(role==="user"){
  document.getElementById("btnTambah").style.display="none";
}

window.logout = function(){
  localStorage.clear();
  location.href="index.html";
}

// TAMBAH
document.getElementById("btnTambah").onclick = async ()=>{
  if(role!=="admin") return;

  await addDoc(collection(db,"drum"),{
    nama:"",
    jumlah:0,
    ceklis:Array(40).fill(false)
  });
};

// REALTIME
onSnapshot(collection(db,"drum"), snapshot => {

  const table = document.getElementById("tableBody");
  table.innerHTML = "";

  let grand = 0;

  snapshot.forEach(docSnap => {

    const data = docSnap.data();
    const id = docSnap.id;

    const tr = document.createElement("tr");

    // NAMA
    const nama = document.createElement("input");
    nama.value = data.nama;
    if(role==="user") nama.disabled = true;

    nama.onchange = ()=>{
      updateDoc(doc(db,"drum",id), { nama: nama.value });
    };

    const tdNama = document.createElement("td");
    tdNama.appendChild(nama);
    tr.appendChild(tdNama);

    // JUMLAH
    const jumlah = document.createElement("input");
    jumlah.type="number";
    jumlah.value = data.jumlah;

    if(role==="user") jumlah.disabled = true;

    jumlah.onchange = ()=>{
      updateDoc(doc(db,"drum",id), { jumlah: parseInt(jumlah.value)||0 });
    };

    const tdJumlah = document.createElement("td");
    tdJumlah.appendChild(jumlah);
    tr.appendChild(tdJumlah);

    let total = 0;

    for(let i=0;i<20;i++){

      const td = document.createElement("td");

      const c1 = document.createElement("input");
      const c2 = document.createElement("input");

      c1.type="checkbox";
      c2.type="checkbox";

      c1.checked = data.ceklis[i*2];
      c2.checked = data.ceklis[i*2+1];

      c1.onchange = ()=>updateCeklis(id,i*2,c1.checked);
      c2.onchange = ()=>updateCeklis(id,i*2+1,c2.checked);

      if(c1.checked) total += 0.5;
      if(c2.checked) total += 0.5;

      td.appendChild(c1);
      td.appendChild(document.createElement("br"));
      td.appendChild(c2);

      if(i >= data.jumlah){
        td.style.display="none";
      }

      tr.appendChild(td);
    }

    const tdTotal = document.createElement("td");
    tdTotal.innerText = total;
    tr.appendChild(tdTotal);

    grand += total;

    if(role==="admin"){
      const btnHapus = document.createElement("button");
      btnHapus.innerText="❌";
      btnHapus.onclick=()=>deleteDoc(doc(db,"drum",id));

      const tdHapus = document.createElement("td");
      tdHapus.appendChild(btnHapus);
      tr.appendChild(tdHapus);
    }

    table.appendChild(tr);

  });

  document.getElementById("grandTotal").innerText = grand;

});

// UPDATE CEKLIS
async function updateCeklis(id,index,value){

  const ref = doc(db,"drum",id);
  const snap = await getDoc(ref);

  let arr = snap.data().ceklis;
  arr[index] = value;

  await updateDoc(ref,{ ceklis: arr });

}

</script>

</body>
</html>
