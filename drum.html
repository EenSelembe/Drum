<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Data Drum Online</title>

<style>
body {
  font-family: Arial;
  background: #121212;
  color: white;
  padding: 20px;
}

table {
  border-collapse: collapse;
  width: 100%;
  display: block;
  overflow-x: auto;
}

th, td {
  border: 1px solid #444;
  padding: 4px;
  text-align: center;
  min-width: 70px;
}

th { background: #1e1e1e; }

input {
  background: #1e1e1e;
  color: white;
  border: none;
  text-align: center;
  font-size: 16px;
}

.input-nama {
  width: 120px;
  text-transform: uppercase;
}

.input-jumlah {
  width: 45px;
  font-size: 18px;
  font-weight: bold;
}

/* DEX */
.dex-box {
  background: #003300;
  border-radius: 4px;
  padding: 2px;
}

.dex-input {
  width: 40px;
  color: #00ff00;
  font-weight: bold;
}

/* checkbox */
input[type="checkbox"] {
  transform: scale(1.2);
}

button {
  padding: 6px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

#btnTambah { background: green; }
.logout { background: red; }

</style>
</head>

<body>

<div style="display:flex;justify-content:space-between;">
  <h2>DATA DRUM ONLINE</h2>
  <div>
    <span id="infoUser"></span>
    <button class="logout" onclick="logout()">Logout</button>
  </div>
</div>

<button id="btnTambah">Tambah Baris</button>

<table>
<thead>
<tr>
<th>Nama</th>
<th>Jumlah</th>

<th id="headerDex"></th>

<th>Total Ceklis</th>
<th>Total Dex</th>
<th>Uang</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>

<h3>Total Semua: <span id="grandTotal">0</span></h3>

<script>
/* HEADER 1 - 20 */
let h = "";
for(let i=1;i<=20;i++){
  h += `<th>${i}</th>`;
}
document.getElementById("headerDex").outerHTML = h;
</script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, addDoc, onSnapshot,
  updateDoc, doc, deleteDoc, getDoc, query, orderBy
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCgLz1_bFzcFzGEbYSIHRpoy3acReyuB7Y",
  authDomain: "drum-26d1c.firebaseapp.com",
  projectId: "drum-26d1c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ROLE
let role = localStorage.getItem("role");
if(!role) location.href="index.html";

document.getElementById("infoUser").innerText="Login: "+role;

if(role==="user"){
  document.getElementById("btnTambah").style.display="none";
}

// LOGOUT
window.logout = ()=>{
  localStorage.clear();
  location.href="index.html";
};

// TAMBAH DATA
document.getElementById("btnTambah").onclick = async ()=>{
  if(role!=="admin") return;

  await addDoc(collection(db,"drum"),{
    nama:"",
    jumlah:0,
    ceklis:Array(40).fill(false),
    dex: Array.from({length:20},()=>({cek:false})),
    createdAt: Date.now()
  });
};

// QUERY
const q = query(collection(db,"drum"), orderBy("createdAt","asc"));

onSnapshot(q, snapshot => {

  const table = document.getElementById("tableBody");
  table.innerHTML="";

  let grand = 0;

  snapshot.forEach(docSnap=>{

    const data = docSnap.data();
    const id = docSnap.id;

    const ceklis = data.ceklis || Array(40).fill(false);
    const dex = data.dex || Array.from({length:20},()=>({cek:false}));

    let totalCeklis = 0;
    let totalDex = 0;

    const tr = document.createElement("tr");

    // NAMA
    const nama = document.createElement("input");
    nama.value = data.nama || "";
    nama.className="input-nama";
    if(role==="user") nama.disabled=true;
    nama.onchange=()=>updateDoc(doc(db,"drum",id),{nama:nama.value.toUpperCase()});
    tr.appendChild(tdWrap(nama));

    // JUMLAH
    const jumlah = document.createElement("input");
    jumlah.type="number";
    jumlah.value=data.jumlah||0;
    jumlah.className="input-jumlah";
    if(role==="user") jumlah.disabled=true;
    jumlah.onchange=()=>updateDoc(doc(db,"drum",id),{jumlah:parseInt(jumlah.value)||0});
    tr.appendChild(tdWrap(jumlah));

    for(let i=0;i<20;i++){

      const td = document.createElement("td");

      // CEKLIS
      const c1=document.createElement("input");
      const c2=document.createElement("input");

      c1.type="checkbox";
      c2.type="checkbox";

      c1.checked=!!ceklis[i*2];
      c2.checked=!!ceklis[i*2+1];

      c1.onchange=()=>updateCeklis(id,i*2,c1.checked);
      c2.onchange=()=>updateCeklis(id,i*2+1,c2.checked);

      if(c1.checked) totalCeklis += 0.5;
      if(c2.checked) totalCeklis += 0.5;

      td.appendChild(c1);
      td.appendChild(c2);

      // DEX (BARU)
      const dexBox = document.createElement("div");
      dexBox.className="dex-box";

      const dexCek=document.createElement("input");
      dexCek.type="checkbox";
      dexCek.checked=!!dex[i]?.cek;

      dexCek.onchange=()=>updateDex(id,i,"cek",dexCek.checked);

      if(dex[i]?.cek){
        totalDex += 50;
      }

      dexBox.appendChild(dexCek);
      td.appendChild(dexBox);

      if(i>=data.jumlah){
        td.style.display="none";
      }

      tr.appendChild(td);
    }

    // UANG
    const uangCeklis = totalCeklis * 100 * 6800;
    const uangDex = totalDex * 50000;
    const uang = uangCeklis + uangDex;

    tr.appendChild(tdWrap(totalCeklis));
    tr.appendChild(tdWrap(totalDex));
    tr.appendChild(tdWrap(uang.toLocaleString("id-ID")));

    grand += uang;

    if(role==="admin"){
      const btn=document.createElement("button");
      btn.innerText="❌";
      btn.onclick=()=>deleteDoc(doc(db,"drum",id));
      tr.appendChild(tdWrap(btn));
    }

    table.appendChild(tr);

  });

  document.getElementById("grandTotal").innerText =
    grand.toLocaleString("id-ID");

});

// HELPER
function tdWrap(el){
  const td=document.createElement("td");
  if(typeof el==="object") td.appendChild(el);
  else td.innerText=el;
  return td;
}

// CEKLIS
async function updateCeklis(id,index,value){
  const ref=doc(db,"drum",id);
  const snap=await getDoc(ref);
  let arr=snap.data().ceklis || Array(40).fill(false);
  arr[index]=value;
  await updateDoc(ref,{ceklis:arr});
}

// DEX
async function updateDex(id,i,field,value){
  const ref=doc(db,"drum",id);
  const snap=await getDoc(ref);
  let arr=snap.data().dex || [];

  arr[i]=arr[i] || {cek:false};
  arr[i][field]=value;

  await updateDoc(ref,{dex:arr});
}

</script>

</body>
</html>
