<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>DATA DRUM ONLINE</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background-color: #121212;
      color: #ffffff;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      overflow-x: auto;
      display: block;
    }
    th, td {
      border: 1px solid #444;
      padding: 6px;
      text-align: center;
      min-width: 60px;
    }
    th { background-color: #1e1e1e; }
    input { background:#1e1e1e; color:#fff; border:none; text-align:center; }
    button { padding:8px; border:none; border-radius:5px; cursor:pointer; }
  </style>
</head>
<body>

<div style="display:flex; justify-content:space-between;">
  <h2>DATA DRUM ONLINE</h2>
  <div>
    <span id="infoUser"></span>
    <button onclick="logout()" style="background:red;">Logout</button>
  </div>
</div>

<button id="btnTambah" onclick="tambahBaris()">Tambah Baris</button>

<table>
<thead>
<tr>
<th>Nama</th>
<th>Jumlah</th>
<script>
for (let i=1;i<=20;i++){document.write("<th>"+i+"</th>")}
</script>
<th>Total</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<h3>Total Semua: <span id="grandTotal">0</span></h3>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, updateDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCgLz1_bFzcFzGEbYSIHRpoy3acReyuB7Y",
  authDomain: "drum-26d1c.firebaseapp.com",
  projectId: "drum-26d1c",
  storageBucket: "drum-26d1c.firebasestorage.app",
  messagingSenderId: "960892789351",
  appId: "1:960892789351:web:ca1c653c85cab59586eac2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ===== ROLE =====
let role = localStorage.getItem("role");
if (!role) location.href="index.html";

document.getElementById("infoUser").textContent = "Login: "+role;
if(role==="user"){
  document.getElementById("btnTambah").style.display="none";
}

// ===== LOGOUT =====
window.logout = function(){
  localStorage.clear();
  location.href="index.html";
}

// ===== TAMBAH DATA =====
window.tambahBaris = async function(){
  if(role!=="admin") return;

  await addDoc(collection(db,"drum"),{
    nama:"",
    jumlah:0,
    ceklis:Array(40).fill(false)
  });
}

// ===== LOAD REALTIME =====
onSnapshot(collection(db,"drum"), snapshot=>{
  const table=document.getElementById("tableBody");
  table.innerHTML="";
  let grand=0;

  snapshot.forEach(docSnap=>{
    const data=docSnap.data();
    const id=docSnap.id;

    const row=document.createElement("tr");

    // nama
    const nama=document.createElement("input");
    nama.value=data.nama;
    if(role==="user") nama.disabled=true;
    nama.oninput=()=>updateField(id,"nama",nama.value);

    const tdNama=document.createElement("td");
    tdNama.appendChild(nama);
    row.appendChild(tdNama);

    // jumlah
    const jumlah=document.createElement("input");
    jumlah.type="number";
    jumlah.value=data.jumlah;
    if(role==="user") jumlah.disabled=true;
    jumlah.oninput=()=>updateField(id,"jumlah",parseInt(jumlah.value)||0);

    const tdJumlah=document.createElement("td");
    tdJumlah.appendChild(jumlah);
    row.appendChild(tdJumlah);

    let total=0;

    for(let i=0;i<20;i++){
      const td=document.createElement("td");

      const c1=document.createElement("input");
      const c2=document.createElement("input");
      c1.type=c2.type="checkbox";

      c1.checked=data.ceklis[i*2];
      c2.checked=data.ceklis[i*2+1];

      c1.onchange=()=>updateCeklis(id,i*2,c1.checked);
      c2.onchange=()=>updateCeklis(id,i*2+1,c2.checked);

      if(c1.checked) total+=0.5;
      if(c2.checked) total+=0.5;

      td.appendChild(c1);
      td.appendChild(document.createElement("br"));
      td.appendChild(c2);

      if(i>=data.jumlah) td.style.display="none";

      row.appendChild(td);
    }

    const tdTotal=document.createElement("td");
    tdTotal.textContent=total;
    row.appendChild(tdTotal);

    grand+=total;
    table.appendChild(row);
  });

  document.getElementById("grandTotal").textContent=grand;
});

// ===== UPDATE FIELD =====
async function updateField(id,field,value){
  await updateDoc(doc(db,"drum",id),{[field]:value});
}

// ===== UPDATE CEKLIS =====
async function updateCeklis(id,index,value){
  const ref=doc(db,"drum",id);
  const snap=await ref.get?.(); // fallback
  let arr=[];

  // safer
  onSnapshot(ref, d=>{
    arr=d.data().ceklis;
  });

  arr[index]=value;

  await updateDoc(ref,{ceklis:arr});
}

</script>

</body>
</html>
