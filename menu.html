<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Menu Utama</title>

<style>
body {
  font-family: Arial;
  background: #121212;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.menu-box {
  text-align: center;
  background: #1e1e1e;
  padding: 30px;
  border-radius: 10px;
  width: 250px;
  box-shadow: 0 0 10px rgba(0,0,0,0.5);
}

h2 {
  margin-bottom: 20px;
}

.menu-btn {
  display: block;
  width: 100%;
  padding: 15px;
  margin: 10px 0;
  font-size: 18px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.2s;
}

.sambo {
  background: #0a84ff;
}

.umum {
  background: #34c759;
}

.menu-btn:hover {
  transform: scale(1.05);
  opacity: 0.9;
}

.logout {
  margin-top: 20px;
  background: red;
  padding: 10px;
  width: 100%;
}
</style>

</head>

<body>

<div class="menu-box">

  <h2>MENU UTAMA</h2>

  <!-- 🔥 SAMBO KE DRUM -->
  <button class="menu-btn sambo" onclick="goSambo()">SAMBO</button>

  <button class="menu-btn umum" onclick="goUmum()">UMUM</button>

  <button class="menu-btn logout" onclick="logout()">Logout</button>

</div>

<script>

// CEK LOGIN
let role = localStorage.getItem("role");

if(!role){
  location.href = "index.html";
}

// 🔥 SAMBO → DRUM.HTML
function goSambo(){
  location.href = "drum.html";
}

// UMUM (bebas nanti mau isi apa)
function goUmum(){
  alert("Menu UMUM belum dibuat");
}

// LOGOUT
function logout(){
  localStorage.clear();
  location.href = "index.html";
}

</script>

</body>
</html>
