<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Drum 2</title>

<style>
body {
  font-family: Arial;
  background: #121212;
  color: white;
  padding: 20px;
}

h2 {
  text-align: center;
}

button {
  padding: 8px 12px;
  margin-bottom: 10px;
  border: none;
  border-radius: 5px;
  background: green;
  color: white;
  cursor: pointer;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: #1e1e1e;
}

th, td {
  border: 1px solid #333;
  padding: 8px;
  text-align: center;
}

input[type="text"] {
  width: 90%;
  padding: 5px;
  text-transform: uppercase;
}

input[type="number"] {
  width: 60px;
  padding: 5px;
  text-align: center;
}

th:nth-child(2), td:nth-child(2) {
  width: 80px;
}

.dex-off {
  background: #5a1a1a;
}

.total-box {
  margin-top: 20px;
  background: #1e1e1e;
  padding: 10px;
  border-radius: 8px;
}
</style>
</head>

<body>

<h2>DRUM 2</h2>

<button onclick="tambahData()">+ Tambah</button>

<table>
<thead>
<tr>
  <th>Nama</th>
  <th>Liter</th>
  <th>Ceklis</th>
  <th>Dex</th>
  <th>Total</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<div class="total-box">
  <p>Total Liter: <span id="totalLiter">0</span></p>
  <p>Total Dex: <span id="totalDex">0</span></p>
  <p>Total Uang Liter: Rp <span id="totalUang">0</span></p>
  <p><b>Total Keseluruhan: Rp <span id="grandTotal">0</span></b></p>
</div>

<script>
let data = JSON.parse(localStorage.getItem("drum2")) || [];
const role = localStorage.getItem("role");

function simpan(){
  localStorage.setItem("drum2", JSON.stringify(data));
}

function tambahData(){
  if(role !== "admin"){
    alert("Hanya admin!");
    return;
  }

  data.push({
    nama: "",
    liter: 0,
    ceklis: false,
    dex: false,
    dexOff: false
  });

  simpan();
  render();
}

function render(){
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  let totalLiter = 0;
  let totalDex = 0;
  let totalUang = 0;

  data.forEach((item, i)=>{
    const tr = document.createElement("tr");

    // NAMA
    const tdNama = document.createElement("td");
    const inputNama = document.createElement("input");
    inputNama.value = item.nama;

    inputNama.oninput = e => {
      const val = e.target.value.toUpperCase();
      e.target.value = val;
      item.nama = val;
      simpan();
    };

    tdNama.appendChild(inputNama);

    // LITER
    const tdLiter = document.createElement("td");
    const inputLiter = document.createElement("input");
    inputLiter.type = "number";
    inputLiter.value = item.liter;

    // 🔥 FIX DISINI
    inputLiter.oninput = e=>{
      item.liter = parseFloat(e.target.value) || 0;
      simpan();
    };

    inputLiter.onchange = ()=>{
      render();
    };

    tdLiter.appendChild(inputLiter);

    // CEKLIS
    const tdCeklis = document.createElement("td");
    const ceklis = document.createElement("input");
    ceklis.type = "checkbox";
    ceklis.checked = item.ceklis;

    ceklis.disabled = (role === "admin");

    ceklis.onchange = ()=>{
      item.ceklis = ceklis.checked;
      simpan();
      render();
    };

    tdCeklis.appendChild(ceklis);

    // DEX
    const tdDex = document.createElement("td");
    const dex = document.createElement("input");
    dex.type = "checkbox";
    dex.checked = item.dex;

    dex.disabled = (role === "admin") || item.dexOff;

    if(item.dexOff){
      tdDex.classList.add("dex-off");
    }

    tdDex.onclick = ()=>{
      if(role !== "admin") return;

      item.dexOff = !item.dexOff;
      if(item.dexOff) item.dex = false;

      simpan();
      render();
    };

    dex.onchange = ()=>{
      item.dex = dex.checked;
      simpan();
      render();
    };

    tdDex.appendChild(dex);

    // TOTAL
    const tdTotal = document.createElement("td");

    let total = 0;

    if(item.ceklis){
      total += item.liter * 6800;
      totalLiter += item.liter;
      totalUang += item.liter * 6800;
    }

    if(item.dex){
      total += 50000;
      totalDex += 50000;
    }

    tdTotal.innerText = "Rp " + total.toLocaleString();

    tr.appendChild(tdNama);
    tr.appendChild(tdLiter);
    tr.appendChild(tdCeklis);
    tr.appendChild(tdDex);
    tr.appendChild(tdTotal);

    tbody.appendChild(tr);
  });

  document.getElementById("totalLiter").innerText = totalLiter;
  document.getElementById("totalDex").innerText = totalDex.toLocaleString();
  document.getElementById("totalUang").innerText = totalUang.toLocaleString();
  document.getElementById("grandTotal").innerText = (totalUang + totalDex).toLocaleString();
}

render();
</script>

</body>
</html>
