<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>DRUM 2</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: #fff;
  padding: 10px;
}

h2 { text-align: center; }

input {
  padding: 10px;
  margin: 5px;
  font-size: 16px;
}

#nama { width: 50%; }
#liter { width: 20%; }

button {
  padding: 10px;
  margin: 5px;
  cursor: pointer;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  border: 1px solid #555;
  padding: 8px;
  text-align: center;
}

.copy { background: green; color: white; }
.hapus { background: red; color: white; }

.total-box {
  margin-top: 10px;
  padding: 10px;
  background: #222;
  border: 1px solid #555;
}
</style>
</head>

<body>

<h2>DATA DRUM 2</h2>

<input type="text" id="nama" placeholder="Nama">
<input type="number" id="liter" placeholder="Liter">

<div id="adminArea"></div>

<button class="copy" onclick="copyData()">Copy</button>

<div class="total-box">
  Total Semua: <span id="totalSemua">0</span> Rp<br>
  Total ✔: <span id="totalCeklis">0</span> L<br>
  Total DEX: <span id="totalDex">0</span> Rp
</div>

<table>
<thead>
<tr>
<th>Nama</th>
<th>Liter</th>
<th>✔</th>
<th>DEX</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

// ================== MODE ==================
const role = "admin"; // ubah jadi "user"

// ================== FIREBASE ==================
const firebaseConfig = {
  apiKey: "AIzaSyCgLz1_bFzcFzGEbYSIHRpoy3acReyuB7Y",
  authDomain: "drum-26d1c.firebaseapp.com",
  projectId: "drum-26d1c",
  storageBucket: "drum-26d1c.appspot.com",
  messagingSenderId: "960892789351",
  appId: "1:960892789351:web:ca1c653c85cab59586eac2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ================== ADMIN UI ==================
if (role === "admin") {
  document.getElementById("adminArea").innerHTML = `
    <button onclick="tambahData()">Tambah</button>
  `;
}

// ================== TAMBAH ==================
window.tambahData = async function() {
  if (role !== "admin") return;

  const nama = document.getElementById("nama").value.toUpperCase();
  const liter = parseFloat(document.getElementById("liter").value);

  if (!nama || !liter) return alert("Isi semua!");

  await addDoc(collection(db, "drum2"), {
    nama,
    liter,
    ceklis: false,
    dex: false
  });

  document.getElementById("nama").value = "";
  document.getElementById("liter").value = "";

  loadData();
}

// ================== LOAD ==================
window.loadData = async function() {
  const snap = await getDocs(collection(db, "drum2"));
  let html = "";

  let totalSemuaLiter = 0;
  let totalCeklis = 0;
  let totalDex = 0;

  snap.forEach((d) => {
    const data = d.data();

    totalSemuaLiter += data.liter;
    if (data.ceklis) totalCeklis += data.liter;

    // DEX = 1 klik = 50.000
    if (data.dex) totalDex += 50000;

    html += `
      <tr>
        <td>${data.nama}</td>
        <td>${data.liter}</td>
        <td>
          <input type="checkbox"
            ${data.ceklis ? "checked" : ""}
            ${role === "admin" ? "disabled" : ""}
            onchange="toggleCeklis('${d.id}', this.checked)">
        </td>
        <td>
          <input type="checkbox"
            ${data.dex ? "checked" : ""}
            ${role === "admin" ? "disabled" : ""}
            onchange="toggleDex('${d.id}', this.checked)">
        </td>
        <td>
          ${role === "admin" ? `<button class="hapus" onclick="hapusData('${d.id}')">Hapus</button>` : ""}
        </td>
      </tr>
    `;
  });

  document.getElementById("tbody").innerHTML = html;

  // ================== RUMUS BARU ==================
  let totalSemuaHarga = (totalSemuaLiter * 6800) + totalDex;

  document.getElementById("totalSemua").innerText =
    totalSemuaHarga.toLocaleString("id-ID");

  document.getElementById("totalCeklis").innerText =
    totalCeklis;

  document.getElementById("totalDex").innerText =
    totalDex.toLocaleString("id-ID");
}

// ================== CEKLIS ==================
window.toggleCeklis = async function(id, status) {
  if (role === "admin") return;
  await updateDoc(doc(db, "drum2", id), { ceklis: status });
  loadData();
}

// ================== DEX ==================
window.toggleDex = async function(id, status) {
  if (role === "admin") return;
  await updateDoc(doc(db, "drum2", id), { dex: status });
  loadData();
}

// ================== HAPUS ==================
window.hapusData = async function(id) {
  if (role !== "admin") return;
  if (confirm("Hapus data?")) {
    await deleteDoc(doc(db, "drum2", id));
    loadData();
  }
}

// ================== COPY ==================
window.copyData = async function() {
  const snap = await getDocs(collection(db, "drum2"));
  let teks = "";

  snap.forEach((d) => {
    const data = d.data();
    teks += `${data.nama} - ${data.liter}L\n`;
  });

  navigator.clipboard.writeText(teks);
  alert("Copied!");
}

loadData();
</script>

</body>
</html>
