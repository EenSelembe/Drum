<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>UMUM</title>

<style>
body {
  font-family: Arial;
  background: #121212;
  color: white;
  padding: 20px;
}

h2 {
  text-align: center;
}

button {
  padding: 8px 12px;
  background: green;
  color: white;
  border: none;
  border-radius: 5px;
  margin-bottom: 10px;
}

.btn-hapus {
  background: red;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: #1e1e1e;
}

th, td {
  border: 1px solid #444;
  padding: 8px;
  text-align: center;
}

input[type="text"] {
  width: 95%;
  padding: 5px;
  text-transform: uppercase;
}

input[type="number"] {
  width: 70px;
  text-align: center;
}

.dex-off {
  background: #8b0000;
}

.total-box {
  margin-top: 20px;
  background: #1e1e1e;
  padding: 10px;
}
</style>
</head>

<body>

<h2>DRUM 2</h2>

<button onclick="tambahData()">+ Tambah</button>

<table>
<thead>
<tr>
  <th>Nama</th>
  <th>Liter</th>
  <th>Ceklis</th>
  <th>Dex</th>
  <th>Total</th>
  <th>Aksi</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<div class="total-box">
  <p>Total Liter: <span id="totalLiter">0</span></p>
  <p>Total Dex: <span id="totalDex">0</span></p>
  <p>Total Uang: Rp <span id="totalUang">0</span></p>
  <p><b>Total Keseluruhan: Rp <span id="grandTotal">0</span></b></p>
</div>

<script>
let data = [];
const role = localStorage.getItem("role");

// TAMBAH
function tambahData(){
  if(role !== "admin") return alert("Hanya admin");

  data.push({
    nama: "",
    liter: 0,
    ceklis: false,
    dex: false,
    dexOff: false
  });

  simpanFirebase(data);
}

// HAPUS
function hapusData(i){
  if(!confirm("Hapus data?")) return;
  data.splice(i,1);
  simpanFirebase(data);
}

// RENDER
function render(){
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  let totalLiter=0, totalDex=0, totalUang=0;

  data.forEach((item,i)=>{
    const tr = document.createElement("tr");

    // NAMA
    const tdNama = document.createElement("td");
    const inputNama = document.createElement("input");
    inputNama.value = item.nama;

    inputNama.oninput = e=>{
      const val = e.target.value.toUpperCase();
      e.target.value = val;
      item.nama = val;
      simpanFirebase(data);
    };

    tdNama.appendChild(inputNama);

    // LITER
    const tdLiter = document.createElement("td");
    const inputLiter = document.createElement("input");
    inputLiter.type = "number";
    inputLiter.value = item.liter;

    inputLiter.oninput = e=>{
      item.liter = parseFloat(e.target.value)||0;
      simpanFirebase(data);
    };

    tdLiter.appendChild(inputLiter);

    // CEKLIS
    const tdCek = document.createElement("td");
    const cek = document.createElement("input");
    cek.type="checkbox";
    cek.checked=item.ceklis;
    cek.disabled = (role==="admin");

    cek.onchange=()=>{
      item.ceklis=cek.checked;
      simpanFirebase(data);
    };

    tdCek.appendChild(cek);

    // DEX
    const tdDex=document.createElement("td");
    const dex=document.createElement("input");
    dex.type="checkbox";
    dex.checked=item.dex;
    dex.disabled = (role==="admin")||item.dexOff;

    if(item.dexOff) tdDex.classList.add("dex-off");

    tdDex.onclick=()=>{
      if(role!=="admin") return;
      item.dexOff=!item.dexOff;
      if(item.dexOff) item.dex=false;
      simpanFirebase(data);
    };

    dex.onchange=()=>{
      item.dex=dex.checked;
      simpanFirebase(data);
    };

    tdDex.appendChild(dex);

    // TOTAL
    const tdTotal=document.createElement("td");
    let total=0;

    if(item.ceklis){
      total+=item.liter*6800;
      totalLiter+=item.liter;
      totalUang+=item.liter*6800;
    }

    if(item.dex){
      total+=50000;
      totalDex+=50000;
    }

    tdTotal.innerText="Rp "+total.toLocaleString();

    // AKSI
    const tdAksi=document.createElement("td");

    if(role==="admin"){
      const btn=document.createElement("button");
      btn.innerText="Hapus";
      btn.className="btn-hapus";
      btn.onclick=()=>hapusData(i);
      tdAksi.appendChild(btn);
    }

    tr.appendChild(tdNama);
    tr.appendChild(tdLiter);
    tr.appendChild(tdCek);
    tr.appendChild(tdDex);
    tr.appendChild(tdTotal);
    tr.appendChild(tdAksi);

    tbody.appendChild(tr);
  });

  document.getElementById("totalLiter").innerText=totalLiter;
  document.getElementById("totalDex").innerText=totalDex.toLocaleString();
  document.getElementById("totalUang").innerText=totalUang.toLocaleString();
  document.getElementById("grandTotal").innerText=(totalUang+totalDex).toLocaleString();
}
</script>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCgLz1_bFzcFzGEbYSIHRpoy3acReyuB7Y",
  authDomain: "drum-26d1c.firebaseapp.com",
  projectId: "drum-26d1c",
  storageBucket: "drum-26d1c.firebasestorage.app",
  messagingSenderId: "960892789351",
  appId: "1:960892789351:web:ca1c653c85cab59586eac2",
  measurementId: "G-Z85SMGMZT7"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// SIMPAN
window.simpanFirebase = function(data){
  set(ref(db,"drum2"), data);
}

// LOAD REALTIME
window.loadFirebase = function(callback){
  onValue(ref(db,"drum2"), snap=>{
    callback(snap.val() || []);
  });
}

// JALANKAN
loadFirebase((val)=>{
  data = val;
  render();
});
</script>

</body>
</html>
