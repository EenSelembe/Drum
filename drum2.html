<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>UMUM</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: #fff;
  padding: 10px;
}

h2 { text-align: center; }

input {
  padding: 8px;
  margin: 5px;
  font-size: 14px;
}

#nama { width: 50%; }
#liter { width: 80px; } /* 🔥 DIPERKECIL */

button {
  padding: 6px;
  cursor: pointer;
}

.add { background: blue; color: white; }
.logout { background: red; color: white; }

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  border: 1px solid #555;
  padding: 6px;
  text-align: center;
}

th:nth-child(3), td:nth-child(3),
th:nth-child(4), td:nth-child(4) {
  width: 90px;
}

/* 🔥 WARNA STABILO */
.dex-active {
  background: #00ff88;
  color: black;
}

.solar-active {
  background: orange;
  color: black;
}

.lock-on { color: red; font-weight: bold; cursor: pointer; }
.lock-off { color: blue; font-weight: bold; cursor: pointer; }

.total-box {
  margin: 10px 0;
  padding: 10px;
  background: #222;
  border: 1px solid #555;
}

input[type="checkbox"] {
  width: 20px;
  height: 20px;
  accent-color: #00ccff;
  cursor: pointer;
}
</style>

</head>
<body>

<h2>DATA UMUM</h2>

<button class="logout" onclick="logout()">Logout</button>

<br>

<input type="text" id="nama" placeholder="Nama">
<input type="number" id="liter" placeholder="Liter">

<button class="add" onclick="tambahData()">Tambah Data</button>

<div class="total-box">
  Total Semua: <span id="totalSemua">0</span> Rp<br>
  Total ✔: <span id="totalCeklis">0</span> L<br>
  Total DEXLITE: <span id="totalDex">0</span> Rp
</div>

<table>
<thead>
<tr>
<th>No</th>
<th>Nama</th>
<th>Liter</th>
<th>DEX</th>
<th>SOLAR</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc,
  updateDoc,
  getDoc,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const role = localStorage.getItem("role") || "user";

if(!localStorage.getItem("role")){
  alert("Silakan login dulu!");
  location.href = "index.html";
}

const firebaseConfig = {
  apiKey: "xxx",
  authDomain: "xxx",
  projectId: "xxx"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.tambahData = async function() {
  if(role !== "admin") return;

  const nama = document.getElementById("nama").value.toUpperCase();
  const liter = parseFloat(document.getElementById("liter").value);

  if(!nama || !liter) return alert("Isi semua!");

  await addDoc(collection(db, "drum2"), {
    nama,
    liter,
    ceklis: false,
    dexlite: false,
    dexLock: liter < 100,
    createdAt: Date.now() /* 🔥 untuk urutan */
  });

  loadData();
}

window.loadData = async function() {

  const q = query(collection(db, "drum2"), orderBy("createdAt", "asc"));
  const snap = await getDocs(q);

  let html = "";
  let totalCeklis = 0;
  let totalDex = 0;
  let no = 1;

  snap.forEach((d) => {
    const data = d.data();

    if(data.ceklis) totalCeklis += data.liter;
    if(data.dexlite) totalDex += 50000;

    let dexClass = data.dexlite ? "dex-active" : "";
    let solarClass = data.ceklis ? "solar-active" : "";

    let lockText = data.dexLock ? "LOCK" : "OPEN";
    let lockClass = data.dexLock ? "lock-on" : "lock-off";

    html += `
      <tr>
        <td>${no++}</td>

        <td>${data.nama}</td>

        <td>
          ${
            role === "admin"
            ? `<input type="number" value="${data.liter}" style="width:60px"
                onchange="editLiter('${d.id}', this.value)">`
            : data.liter
          }
        </td>

        <td class="${dexClass}">
          <input type="checkbox"
            ${data.dexlite ? "checked" : ""}
            ${(role !== "user" || data.dexLock) ? "disabled" : ""}
            onchange="toggleDexlite('${d.id}', this.checked)">
          
          ${
            role === "admin"
              ? `<span onclick="toggleLock('${d.id}', ${data.dexLock})" class="${lockClass}">
                  ${lockText}
                </span>`
              : ""
          }
        </td>

        <td class="${solarClass}">
          <input type="checkbox"
            ${data.ceklis ? "checked" : ""}
            ${role === "admin" ? "disabled" : ""}
            onchange="toggleCeklis('${d.id}', this.checked)">
        </td>

        <td>
          ${role === "admin" ? `<button onclick="hapusData('${d.id}')">Hapus</button>` : ""}
        </td>
      </tr>
    `;
  });

  document.getElementById("tbody").innerHTML = html;

  let totalSemua = (totalCeklis * 6800) + totalDex;

  document.getElementById("totalSemua").innerText = totalSemua.toLocaleString("id-ID");
  document.getElementById("totalCeklis").innerText = totalCeklis;
  document.getElementById("totalDex").innerText = totalDex.toLocaleString("id-ID");
}

// ================= POPUP =================

function popupConfirm(pesan){
  return new Promise((resolve)=>{
    let div = document.createElement("div");

    div.innerHTML = `
      <div style="
        position:fixed;
        top:0;left:0;
        width:100%;
        height:100%;
        background:rgba(0,0,0,0.8);
        display:flex;
        justify-content:center;
        align-items:center;
        z-index:9999;
      ">
        <div style="background:#222;padding:20px;border-radius:10px;text-align:center;">
          <p>${pesan}</p>
          <button id="ya">Ya</button>
          <button id="tidak">Batal</button>
        </div>
      </div>
    `;

    document.body.appendChild(div);

    div.querySelector("#ya").onclick = ()=>{
      div.remove();
      resolve(true);
    };

    div.querySelector("#tidak").onclick = ()=>{
      div.remove();
      resolve(false);
    };
  });
}

// ================= LOGIC =================

window.toggleDexlite = async function(id, status){
  if(role !== "user") return;

  let ok = await popupConfirm(
    status ? "Apakah DEX sudah terisi?" : "Yakin lepas centang DEX?"
  );

  if(!ok) return loadData();

  await updateDoc(doc(db,"drum2",id),{
    dexlite: status
  });

  loadData();
}

window.toggleCeklis = async function(id, status){
  if(role !== "user") return;

  let ok = await popupConfirm(
    status ? "Apakah SOLAR sudah terisi?" : "Yakin lepas centang SOLAR?"
  );

  if(!ok) return loadData();

  await updateDoc(doc(db,"drum2",id),{
    ceklis: status
  });

  loadData();
}

window.toggleLock = async function(id, current){
  if(role !== "admin") return;

  await updateDoc(doc(db,"drum2",id),{
    dexLock: !current
  });

  loadData();
}

window.editLiter = async function(id, value){
  if(role !== "admin") return;

  let liter = parseFloat(value);

  await updateDoc(doc(db,"drum2",id),{
    liter,
    dexLock: liter < 100
  });

  loadData();
}

window.hapusData = async function(id){
  if(role !== "admin") return;

  await deleteDoc(doc(db,"drum2",id));
  loadData();
}

window.logout = function(){
  localStorage.removeItem("role");
  location.href = "index.html";
}

loadData();
</script>

</body>
</html>
