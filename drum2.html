<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>DATA UMUM</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: #fff;
  padding: 10px;
}

h2 { text-align: center; }

input {
  padding: 6px;
  margin: 5px;
}

#nama { width: 50%; }
#liter { width: 70px; }

button {
  padding: 6px;
  cursor: pointer;
}

.add { background: blue; color: white; }
.logout { background: red; color: white; }

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  border: 1px solid #555;
  padding: 6px;
  text-align: center;
}

/* ukuran kolom */
th:nth-child(1), td:nth-child(1) { width: 40px; }
th:nth-child(3), td:nth-child(3) { width: 80px; }

/* warna */
.dex-active {
  background: #00ff88;
  color: black;
  font-weight: bold;
}

.solar-active {
  background: orange;
  color: black;
  font-weight: bold;
}

.lock-on { color: red; font-weight: bold; cursor: pointer; }
.lock-off { color: cyan; font-weight: bold; cursor: pointer; }

input[type="checkbox"] {
  width: 18px;
  height: 18px;
}
</style>
</head>

<body>

<h2>DATA UMUM</h2>

<button class="logout" onclick="logout()">Logout</button>

<br>

<input type="text" id="nama" placeholder="Nama">
<input type="number" id="liter" placeholder="Liter">
<button class="add" onclick="tambahData()">Tambah Data</button>

<table>
<thead>
<tr>
<th>No</th>
<th>Nama</th>
<th>Liter</th>
<th>DEX</th>
<th>SOLAR</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const role = localStorage.getItem("role") || "user";

if(!localStorage.getItem("role")){
  alert("Login dulu!");
  location.href = "index.html";
}

const firebaseConfig = {
  apiKey: "ISI_API_KEY",
  authDomain: "ISI_AUTH",
  projectId: "ISI_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* TAMBAH DATA */
window.tambahData = async function() {
  if(role !== "admin") return;

  const nama = document.getElementById("nama").value.toUpperCase();
  const liter = parseFloat(document.getElementById("liter").value);

  if(!nama || !liter) return alert("Isi semua!");

  await addDoc(collection(db, "drum2"), {
    nama,
    liter,
    ceklis: false,
    dexlite: false,
    dexLock: liter < 100
  });

  loadData();
}

/* LOAD DATA */
window.loadData = async function() {

  const snap = await getDocs(collection(db, "drum2"));

  let dataArr = [];

  snap.forEach((d)=>{
    dataArr.push({
      id: d.id,
      ...d.data()
    });
  });

  let html = "";

  dataArr.forEach((data, index)=>{

    let dexClass = data.dexlite ? "dex-active" : "";
    let solarClass = data.ceklis ? "solar-active" : "";

    let lockText = data.dexLock ? "LOCK" : "OPEN";
    let lockClass = data.dexLock ? "lock-on" : "lock-off";

    html += `
    <tr>
      <td>${index + 1}</td>

      <td>${data.nama}</td>

      <td>
        ${
          role === "admin"
          ? `<input type="number" value="${data.liter}" style="width:60px"
              onchange="editLiter('${data.id}', this.value)">`
          : data.liter
        }
      </td>

      <td class="${dexClass}">
        <input type="checkbox"
          ${data.dexlite ? "checked" : ""}
          ${(role !== "user" || data.dexLock) ? "disabled" : ""}
          onchange="toggleDexlite('${data.id}', this.checked)">

        ${
          role === "admin"
          ? `<span onclick="toggleLock('${data.id}', ${data.dexLock})" class="${lockClass}">
              ${lockText}
            </span>`
          : ""
        }
      </td>

      <td class="${solarClass}">
        <input type="checkbox"
          ${data.ceklis ? "checked" : ""}
          ${role === "admin" ? "disabled" : ""}
          onchange="toggleCeklis('${data.id}', this.checked)">
      </td>

      <td>
        ${role === "admin" ? `<button onclick="hapusData('${data.id}')">Hapus</button>` : ""}
      </td>
    </tr>
    `;
  });

  document.getElementById("tbody").innerHTML = html;
}

/* POPUP */
function popupConfirm(pesan){
  return new Promise((resolve)=>{
    let div = document.createElement("div");

    div.innerHTML = `
    <div style="
      position:fixed;
      top:0;left:0;
      width:100%;height:100%;
      background:rgba(0,0,0,0.8);
      display:flex;
      justify-content:center;
      align-items:center;
      z-index:9999;">
      
      <div style="background:#222;padding:20px;border-radius:10px;text-align:center;">
        <p>${pesan}</p>
        <button id="ya">YA</button>
        <button id="tidak">BATAL</button>
      </div>
    </div>
    `;

    document.body.appendChild(div);

    div.querySelector("#ya").onclick = ()=>{ div.remove(); resolve(true); }
    div.querySelector("#tidak").onclick = ()=>{ div.remove(); resolve(false); }
  });
}

/* LOGIC */
window.toggleDexlite = async function(id, status){
  if(role !== "user") return;

  let ok = await popupConfirm(
    status ? "Apakah DEX sudah terisi?" : "Yakin lepas DEX?"
  );

  if(!ok) return loadData();

  await updateDoc(doc(db,"drum2",id),{
    dexlite: status
  });

  loadData();
}

window.toggleCeklis = async function(id, status){
  if(role !== "user") return;

  let ok = await popupConfirm(
    status ? "Apakah SOLAR sudah terisi?" : "Yakin lepas SOLAR?"
  );

  if(!ok) return loadData();

  await updateDoc(doc(db,"drum2",id),{
    ceklis: status
  });

  loadData();
}

window.toggleLock = async function(id, current){
  if(role !== "admin") return;

  await updateDoc(doc(db,"drum2",id),{
    dexLock: !current
  });

  loadData();
}

window.editLiter = async function(id, value){
  if(role !== "admin") return;

  let liter = parseFloat(value);

  await updateDoc(doc(db,"drum2",id),{
    liter,
    dexLock: liter < 100
  });

  loadData();
}

window.hapusData = async function(id){
  if(role !== "admin") return;

  await deleteDoc(doc(db,"drum2",id));
  loadData();
}

window.logout = function(){
  localStorage.removeItem("role");
  location.href = "index.html";
}

loadData();

</script>
</body>
</html>
