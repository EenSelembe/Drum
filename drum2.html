<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Drum 2</title>

<style>
body {
  font-family: Arial;
  background: #121212;
  color: white;
  margin: 0;
  padding: 10px;
}

h2 {
  text-align: center;
}

button {
  padding: 8px 12px;
  margin-bottom: 10px;
  background: green;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  border: 1px solid #444;
  padding: 8px;
  text-align: center;
}

th {
  background: #1e1e1e;
}

input[type="text"], input[type="number"] {
  width: 90%;
  padding: 5px;
}

input[type="checkbox"] {
  transform: scale(1.2);
}

.dex-off {
  background: red !important;
}

.total-box {
  margin-top: 15px;
  padding: 12px;
  background: #1e1e1e;
  border-radius: 8px;
  line-height: 1.8;
}
</style>
</head>

<body>

<h2>DRUM 2</h2>

<button id="tambahBtn" onclick="tambahData()">+ Tambah Data</button>

<table>
  <thead>
    <tr>
      <th>Nama</th>
      <th>Liter</th>
      <th>Ceklis</th>
      <th>DEX (+50rb)</th>
    </tr>
  </thead>

  <tbody id="bodyData"></tbody>
</table>

<div class="total-box">
  <p>Total Liter: <span id="totalLiter">0</span></p>
  <p>Total DEX: <span id="totalDex">0</span></p>
  <p>Total Uang Liter: Rp <span id="uangLiter">0</span></p>
  <p><b>Total Keseluruhan: Rp <span id="grandTotal">0</span></b></p>
</div>

<script>

const role = localStorage.getItem("role"); // admin / user

let data = [
  { nama: "", liter: 0, dexOff: false }
];

function tambahData(){
  if(role !== "admin") return;

  data.push({ nama: "", liter: 0, dexOff: false });
  render();
}

function render(){

  const body = document.getElementById("bodyData");
  body.innerHTML = "";

  data.forEach((item, index) => {

    const tr = document.createElement("tr");

    // Nama
    const tdNama = document.createElement("td");
    const inputNama = document.createElement("input");
    inputNama.type = "text";
    inputNama.value = item.nama;
    inputNama.oninput = e => item.nama = e.target.value;

    if(role !== "admin") inputNama.disabled = true;

    tdNama.appendChild(inputNama);

    // Liter
    const tdLiter = document.createElement("td");
    const inputLiter = document.createElement("input");
    inputLiter.type = "number";
    inputLiter.value = item.liter;

    inputLiter.oninput = e => {
      item.liter = Number(e.target.value);
      hitung();
    };

    if(role !== "admin") inputLiter.disabled = true;

    tdLiter.appendChild(inputLiter);

    // Ceklis biasa
    const tdCeklis = document.createElement("td");
    const cek1 = document.createElement("input");
    cek1.type = "checkbox";
    cek1.onchange = hitung;

    // ❌ admin tidak bisa ceklis
    if(role === "admin") cek1.disabled = true;

    tdCeklis.appendChild(cek1);

    // DEX
    const tdDex = document.createElement("td");
    const cek2 = document.createElement("input");
    cek2.type = "checkbox";
    cek2.onchange = hitung;

    // ❌ admin tidak bisa ceklis
    if(role === "admin") cek2.disabled = true;

    // 🔥 ADMIN bisa tutup dex
    if(role === "admin"){
      tdDex.onclick = function(e){
        if(e.target.tagName !== "INPUT"){
          item.dexOff = !item.dexOff;

          if(item.dexOff){
            tdDex.classList.add("dex-off");
          } else {
            tdDex.classList.remove("dex-off");
          }

          render();
        }
      };
    }

    // kalau dex ditutup → user tidak bisa klik
    if(item.dexOff){
      cek2.disabled = true;
      tdDex.classList.add("dex-off");
    }

    tdDex.appendChild(cek2);

    tr.appendChild(tdNama);
    tr.appendChild(tdLiter);
    tr.appendChild(tdCeklis);
    tr.appendChild(tdDex);

    body.appendChild(tr);

  });

  // tombol tambah hanya admin
  if(role !== "admin"){
    document.getElementById("tambahBtn").style.display = "none";
  }

  hitung();
}

function hitung(){

  let totalLiter = 0;
  let totalDex = 0;
  let uangLiter = 0;

  const rows = document.querySelectorAll("#bodyData tr");

  rows.forEach(row => {

    const liter = Number(row.children[1].querySelector("input").value);
    const cek1 = row.children[2].querySelector("input").checked;
    const cek2 = row.children[3].querySelector("input").checked;

    if(cek1){
      totalLiter += liter;
      uangLiter += liter * 6800;
    }

    if(cek2){
      totalDex += 1;
    }

  });

  const uangDex = totalDex * 50000;
  const grandTotal = uangLiter + uangDex;

  document.getElementById("totalLiter").innerText = totalLiter;
  document.getElementById("totalDex").innerText = totalDex;
  document.getElementById("uangLiter").innerText = uangLiter.toLocaleString();
  document.getElementById("grandTotal").innerText = grandTotal.toLocaleString();

}

render();

</script>

</body>
</html>
