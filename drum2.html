<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>DRUM 2</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: #fff;
  padding: 10px;
}

h2 { text-align: center; }

input {
  padding: 10px;
  margin: 5px;
  font-size: 16px;
}

#nama { width: 50%; }
#liter { width: 20%; }

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  border: 1px solid #555;
  padding: 8px;
  text-align: center;
}

button {
  padding: 6px;
  cursor: pointer;
}

.copy { background: green; color: white; }

.lock-on {
  color: #00ff7f;
  font-weight: bold;
  cursor: pointer;
}
.lock-off {
  color: #ff4d4d;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<h2>DATA DRUM 2</h2>

<input type="text" id="nama" placeholder="Nama">
<input type="number" id="liter" placeholder="Liter">

<div class="copy" onclick="copyData()">Copy</div>

<table>
<thead>
<tr>
<th>Nama</th>
<th>Liter</th>
<th>DEXLITE</th>
<th>CEKLIS</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

// ================== MODE ==================
const role = "admin"; // ubah ke "user"

// ================== FIREBASE ==================
const firebaseConfig = {
  apiKey: "AIzaSyCgLz1_bFzcFzGEbYSIHRpoy3acReyuB7Y",
  authDomain: "drum-26d1c.firebaseapp.com",
  projectId: "drum-26d1c",
  storageBucket: "drum-26d1c.appspot.com",
  messagingSenderId: "960892789351",
  appId: "1:960892789351:web:ca1c653c85cab59586eac2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ================== TAMBAH ==================
window.tambahData = async function() {
  const nama = document.getElementById("nama").value.toUpperCase();
  const liter = parseFloat(document.getElementById("liter").value);

  if (!nama || !liter) return alert("Isi semua!");

  await addDoc(collection(db, "drum2"), {
    nama,
    liter,
    ceklis: false,
    dexlite: false,
    dexLock: false
  });

  loadData();
}

// ================== LOAD ==================
window.loadData = async function() {
  const snap = await getDocs(collection(db, "drum2"));
  let html = "";

  snap.forEach((d) => {
    const data = d.data();

    let lockText = data.dexLock ? "LOCK" : "OPEN";
    let lockClass = data.dexLock ? "lock-on" : "lock-off";

    html += `
      <tr>
        <td>${data.nama}</td>
        <td>${data.liter}</td>

        <!-- 🔷 DEXLITE -->
        <td>
          <input type="checkbox"
            ${data.dexlite ? "checked" : ""}
            ${role === "admin" ? "disabled" : ""}
            onchange="toggleDexlite('${d.id}', this.checked)">

          ${
            role === "admin"
              ? `<span onclick="toggleLock('${d.id}', ${data.dexLock})"
                        class="${lockClass}">
                  DEX (${lockText})
                </span>`
              : ""
          }
        </td>

        <!-- ✔ CEKLIS -->
        <td>
          <input type="checkbox"
            ${data.ceklis ? "checked" : ""}
            ${role === "admin" ? "disabled" : ""}
            onchange="toggleCeklis('${d.id}', this.checked)">
        </td>

        <td>
          <button onclick="hapusData('${d.id}')">Hapus</button>
        </td>
      </tr>
    `;
  });

  document.getElementById("tbody").innerHTML = html;
}

// ================== DEXLITE (USER ONLY) ==================
window.toggleDexlite = async function(id, status) {
  if (role === "admin") return; // ❌ FIX UTAMA

  await updateDoc(doc(db, "drum2", id), {
    dexlite: status
  });

  loadData();
}

// ================== LOCK DEX (ADMIN ONLY) ==================
window.toggleLock = async function(id, current) {
  if (role !== "admin") return;

  await updateDoc(doc(db, "drum2", id), {
    dexLock: !current
  });

  loadData();
}

// ================== CEKLIS (USER ONLY) ==================
window.toggleCeklis = async function(id, status) {
  if (role === "admin") return;

  await updateDoc(doc(db, "drum2", id), {
    ceklis: status
  });

  loadData();
}

// ================== DELETE ==================
window.hapusData = async function(id) {
  await deleteDoc(doc(db, "drum2", id));
  loadData();
}

// ================== COPY ==================
window.copyData = async function() {
  const snap = await getDocs(collection(db, "drum2"));
  let teks = "";

  snap.forEach((d) => {
    const data = d.data();
    teks += `${data.nama} - ${data.liter}L\n`;
  });

  navigator.clipboard.writeText(teks);
  alert("Copied!");
}

loadData();
</script>

</body>
</html>
