<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>UMUM</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: #fff;
  padding: 10px;
}

h2 { text-align: center; }

input {
  padding: 10px;
  margin: 5px;
  font-size: 16px;
}

#nama { width: 50%; }
#liter { width: 20%; }

button {
  padding: 6px;
  cursor: pointer;
}

.add { background: blue; color: white; }
.logout { background: red; color: white; }

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  border: 1px solid #555;
  padding: 8px;
  text-align: center;
}

.lock-on {
  color: red;
  font-weight: bold;
  cursor: pointer;
}

.lock-off {
  color: cyan;
  font-weight: bold;
  cursor: pointer;
}

/* 🔥 WARNA HANYA KOLOM CEKLIS */
.dex-checked {
  background: #00ff99;
  color: black;
  font-weight: bold;
}

.solar-checked {
  background: orange;
  color: black;
  font-weight: bold;
}

/* checkbox */
input[type="checkbox"] {
  width: 20px;
  height: 20px;
  cursor: pointer;
}

/* 🔥 POPUP */
.popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.7);
}

.popup-box {
  background: #222;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
}

.popup-box button {
  padding: 8px 15px;
  margin: 5px;
  border: none;
  cursor: pointer;
}

.yes { background: limegreen; }
.no { background: red; color: white; }

</style>
</head>

<body>

<h2>DATA UMUM</h2>

<button class="logout" onclick="logout()">Logout</button>

<br>

<input type="text" id="nama" placeholder="Nama">
<input type="number" id="liter" placeholder="Liter">

<button class="add" onclick="tambahData()">Tambah Data</button>

<table>
<thead>
<tr>
<th>Nama</th>
<th>Liter</th>
<th>DEX</th>
<th>SOLAR</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>

<!-- 🔥 POPUP -->
<div id="popup" class="popup">
  <div class="popup-box">
    <p>Apakah BBM sudah terisi?</p>
    <button class="yes" onclick="jawabPopup(true)">YA</button>
    <button class="no" onclick="jawabPopup(false)">BELUM</button>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc,
  updateDoc,
  getDoc
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

/* 🔐 ROLE */
const role = localStorage.getItem("role") || "user";

/* 🔥 CONFIG ASLI (JANGAN DIUBAH!) */
const firebaseConfig = {
  apiKey: "AIzaSyCgLz1_bFzcFzGEbYSIHRpoy3acReyuB7Y",
  authDomain: "drum-26d1c.firebaseapp.com",
  projectId: "drum-26d1c",
  storageBucket: "drum-26d1c.appspot.com",
  messagingSenderId: "960892789351",
  appId: "1:960892789351:web:ca1c653c85cab59586eac2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ================= TAMBAH ================= */
window.tambahData = async function() {

  if(role !== "admin") return;

  const nama = document.getElementById("nama").value.toUpperCase();
  const liter = parseFloat(document.getElementById("liter").value);

  if(!nama || !liter) return alert("Isi semua!");

  await addDoc(collection(db, "drum2"), {
    nama,
    liter,
    ceklis: false,
    dexlite: false,
    dexLock: liter < 100 ? true : false
  });

  loadData();
}

/* ================= LOAD ================= */
window.loadData = async function() {

  const snap = await getDocs(collection(db, "drum2"));

  let html = "";

  snap.forEach((d) => {

    const data = d.data();

    let dexClass = data.dexlite ? "dex-checked" : "";
    let solarClass = data.ceklis ? "solar-checked" : "";

    html += `
    <tr>
      <td>${data.nama}</td>
      <td>${data.liter}</td>

      <td class="${dexClass}">
        <input type="checkbox"
          ${data.dexlite ? "checked" : ""}
          ${(role !== "user" || data.dexLock) ? "disabled" : ""}
          onchange="toggleDexlite('${d.id}', this.checked)">

        ${
          role === "admin"
          ? `<span onclick="toggleLock('${d.id}', ${data.dexLock})">
              ${data.dexLock ? "LOCK" : "OPEN"}
            </span>`
          : ""
        }
      </td>

      <td class="${solarClass}">
        <input type="checkbox"
          ${data.ceklis ? "checked" : ""}
          ${role === "admin" ? "disabled" : ""}
          onchange="toggleCeklis('${d.id}', this.checked)">
      </td>

      <td>
        ${role === "admin" ? `<button onclick="hapusData('${d.id}')">Hapus</button>` : ""}
      </td>
    </tr>
    `;
  });

  document.getElementById("tbody").innerHTML = html;
}

/* ================= DEX ================= */
window.toggleDexlite = async function(id, status){

  const snap = await getDoc(doc(db,"drum2",id));
  const data = snap.data();

  if(data.dexLock) return;
  if(role !== "user") return;

  await updateDoc(doc(db,"drum2",id),{
    dexlite: status
  });

  loadData();
}

/* ================= POPUP ================= */
let selectedId = null;
let selectedStatus = null;

window.toggleCeklis = function(id, status){

  if(role !== "user") return;

  selectedId = id;
  selectedStatus = status;

  document.getElementById("popup").style.display = "flex";
}

window.jawabPopup = async function(jawab){

  document.getElementById("popup").style.display = "none";

  if(!jawab){
    loadData();
    return;
  }

  await updateDoc(doc(db,"drum2",selectedId),{
    ceklis: selectedStatus
  });

  loadData();
}

/* ================= LOCK ================= */
window.toggleLock = async function(id, current){

  if(role !== "admin") return;

  await updateDoc(doc(db,"drum2",id),{
    dexLock: !current
  });

  loadData();
}

/* ================= DELETE ================= */
window.hapusData = async function(id){

  if(role !== "admin") return;

  await deleteDoc(doc(db,"drum2",id));
  loadData();
}

/* ================= LOGOUT ================= */
window.logout = function(){
  localStorage.removeItem("role");
  location.href = "index.html";
}

loadData();

</script>
</body>
</html>
