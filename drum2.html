<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>DRUM 2</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: #fff;
  padding: 10px;
}

h2 { text-align: center; }

input {
  padding: 10px;
  margin: 5px;
  font-size: 16px;
}

#nama { width: 50%; }
#liter { width: 20%; }

button {
  padding: 10px;
  margin: 5px;
  cursor: pointer;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  border: 1px solid #555;
  padding: 8px;
  text-align: center;
}

.copy { background: green; color: white; }
.hapus { background: red; color: white; }

.total-box {
  margin-top: 10px;
  padding: 10px;
  background: #222;
  border: 1px solid #555;
}

/* 🔥 warna status */
.dex-on {
  color: #00ff7f;
}

.dex-off {
  color: #ff4d4d;
}
</style>
</head>

<body>

<h2>DATA DRUM 2</h2>

<input type="text" id="nama" placeholder="Nama">
<input type="number" id="liter" placeholder="Liter">

<div id="adminArea"></div>

<button class="copy" onclick="copyData()">Copy</button>

<div class="total-box">
  Total Semua: <span id="totalSemua">0</span> Rp<br>
  Total ✔: <span id="totalCeklis">0</span> L<br>
  Total DEX: <span id="totalDex">0</span> Rp
</div>

<table>
<thead>
<tr>
<th>Nama</th>
<th>Liter</th>

<!-- 🔥 CLICK HEADER DEX -->
<th onclick="toggleDexSystem()" style="cursor:pointer;">
DEX (<span id="dexStatus" class="dex-on">ON</span>)
</th>

<th>✔</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

// ================== MODE ==================
const role = "admin";

// ================== DEX CONTROL ==================
let dexEnabled = true;

// ================== FIREBASE ==================
const firebaseConfig = {
  apiKey: "AIzaSyCgLz1_bFzcFzGEbYSIHRpoy3acReyuB7Y",
  authDomain: "drum-26d1c.firebaseapp.com",
  projectId: "drum-26d1c",
  storageBucket: "drum-26d1c.appspot.com",
  messagingSenderId: "960892789351",
  appId: "1:960892789351:web:ca1c653c85cab59586eac2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ================== TOGGLE DEX (klik header) ==================
window.toggleDexSystem = function() {
  if (role !== "admin") return;

  dexEnabled = !dexEnabled;
  loadData();
}

// ================== TAMBAH ==================
window.tambahData = async function() {
  const nama = document.getElementById("nama").value.toUpperCase();
  const liter = parseFloat(document.getElementById("liter").value);

  if (!nama || !liter) return alert("Isi semua!");

  await addDoc(collection(db, "drum2"), {
    nama,
    liter,
    ceklis: false,
    dex: false
  });

  loadData();
}

// ================== LOAD ==================
window.loadData = async function() {
  const snap = await getDocs(collection(db, "drum2"));
  let html = "";

  let totalCeklisLiter = 0;
  let totalDex = 0;

  snap.forEach((d) => {
    const data = d.data();

    if (data.ceklis) totalCeklisLiter += data.liter;
    if (data.dex) totalDex += 50000;

    html += `
      <tr>
        <td>${data.nama}</td>
        <td>${data.liter}</td>

        <!-- 🔷 DEX -->
        <td>
          <input type="checkbox"
            ${data.dex ? "checked" : ""}
            ${(!dexEnabled) ? "disabled" : ""}
            onchange="toggleDex('${d.id}', this.checked)">
        </td>

        <!-- ✔ CEKLIS -->
        <td>
          <input type="checkbox"
            ${data.ceklis ? "checked" : ""}
            onchange="toggleCeklis('${d.id}', this.checked)">
        </td>

        <td>
          <button class="hapus" onclick="hapusData('${d.id}')">Hapus</button>
        </td>
      </tr>
    `;
  });

  document.getElementById("tbody").innerHTML = html;

  // ================== STATUS HEADER ==================
  const status = document.getElementById("dexStatus");
  status.innerText = dexEnabled ? "ON" : "OFF";
  status.className = dexEnabled ? "dex-on" : "dex-off";

  // ================== TOTAL ==================
  let totalSemua = (totalCeklisLiter * 6800) + totalDex;

  document.getElementById("totalSemua").innerText =
    totalSemua.toLocaleString("id-ID");

  document.getElementById("totalCeklis").innerText = totalCeklisLiter;

  document.getElementById("totalDex").innerText =
    totalDex.toLocaleString("id-ID");
}

// ================== CEKLIS ==================
window.toggleCeklis = async function(id, status) {
  await updateDoc(doc(db, "drum2", id), { ceklis: status });
  loadData();
}

// ================== DEX ==================
window.toggleDex = async function(id, status) {
  if (!dexEnabled) return;
  await updateDoc(doc(db, "drum2", id), { dex: status });
  loadData();
}

// ================== DELETE ==================
window.hapusData = async function(id) {
  await deleteDoc(doc(db, "drum2", id));
  loadData();
}

// ================== COPY ==================
window.copyData = async function() {
  const snap = await getDocs(collection(db, "drum2"));
  let teks = "";

  snap.forEach((d) => {
    const data = d.data();
    teks += `${data.nama} - ${data.liter}L\n`;
  });

  navigator.clipboard.writeText(teks);
  alert("Copied!");
}

loadData();
</script>

</body>
</html>
