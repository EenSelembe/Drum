<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>DRUM 2</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: #fff;
  padding: 10px;
}

h2 {
  text-align: center;
}

input {
  padding: 10px;
  margin: 5px;
  font-size: 16px;
}

#nama {
  width: 60%;
}

#liter {
  width: 30%;
}

button {
  padding: 10px;
  margin: 5px;
  font-size: 14px;
  cursor: pointer;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

th, td {
  border: 1px solid #555;
  padding: 8px;
  text-align: center;
}

th {
  background: #222;
}

.copy {
  background: green;
  color: white;
}

.hapus {
  background: red;
  color: white;
}
</style>
</head>

<body>

<h2>DATA DRUM 2</h2>

<input type="text" id="nama" placeholder="Nama">
<input type="number" id="liter" placeholder="Liter">

<button onclick="tambahData()">Tambah</button>
<button class="copy" onclick="copyData()">Copy</button>

<table>
<thead>
<tr>
<th>Nama</th>
<th>Liter</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCgLz1_bFzcFzGEbYSIHRpoy3acReyuB7Y",
  authDomain: "drum-26d1c.firebaseapp.com",
  projectId: "drum-26d1c",
  storageBucket: "drum-26d1c.appspot.com",
  messagingSenderId: "960892789351",
  appId: "1:960892789351:web:ca1c653c85cab59586eac2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ================= TAMBAH DATA =================
window.tambahData = async function() {
  const namaInput = document.getElementById("nama");
  const literInput = document.getElementById("liter");

  const nama = namaInput.value.toUpperCase();
  const liter = parseFloat(literInput.value);

  if (!nama || !liter) {
    alert("Isi semua data!");
    return;
  }

  await addDoc(collection(db, "drum2"), {
    nama,
    liter
  });

  namaInput.value = "";
  literInput.value = "";

  loadData();
}

// ================= LOAD DATA =================
window.loadData = async function() {
  const querySnapshot = await getDocs(collection(db, "drum2"));
  let html = "";

  querySnapshot.forEach((docSnap) => {
    const d = docSnap.data();

    html += `
      <tr>
        <td>${d.nama}</td>
        <td>${d.liter}</td>
        <td>
          <button class="hapus" onclick="hapusData('${docSnap.id}')">Hapus</button>
        </td>
      </tr>
    `;
  });

  document.getElementById("tbody").innerHTML = html;
}

// ================= HAPUS =================
window.hapusData = async function(id) {
  if(confirm("Hapus data ini?")){
    await deleteDoc(doc(db, "drum2", id));
    loadData();
  }
}

// ================= COPY =================
window.copyData = async function() {
  const querySnapshot = await getDocs(collection(db, "drum2"));
  let teks = "";

  querySnapshot.forEach((docSnap) => {
    const d = docSnap.data();
    teks += `${d.nama} - ${d.liter}L\n`;
  });

  navigator.clipboard.writeText(teks);
  alert("Data berhasil dicopy!");
}

// ================= LOAD AWAL =================
loadData();

</script>

</body>
</html>
